<!--
  Supabase Auth email template: "Invite user"
  Paste into: Supabase Studio → Authentication → Email Templates → Invite user
  Supabase variables used: {{ .ConfirmationURL }}
  Sent by: app/api/invite/route.ts (admin.auth.admin.inviteUserByEmail)
-->
<div style="background-color:#FBF4EF; padding:40px 16px; font-family:'Nunito Sans', Helvetica, Arial, sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:480px; margin:0 auto;">
    <tr>
      <td style="text-align:center; padding-bottom:24px;">
        <span style="font-family:'Cormorant Garamond', Georgia, serif; font-size:28px; color:#6B3550; letter-spacing:0.02em;">
          Sorted &amp; Stocked
        </span>
      </td>
    </tr>
    <tr>
      <td style="background-color:#ffffff; border:1px solid #F0D9CE; border-radius:20px; padding:40px 32px;">
        <h1 style="font-family:'Cormorant Garamond', Georgia, serif; font-size:24px; color:#6B3550; margin:0 0 12px; text-align:center;">
          You've been invited
        </h1>
        <p style="font-size:15px; line-height:1.6; color:#3A2A33; text-align:center; margin:0 0 28px;">
          You've been invited to join a household on Sorted &amp; Stocked —
          The Proactive Home Inventory System. Accept the invite to set your password and get started.
        </p>
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
          <tr>
            <td align="center">
              <a href="{{ .ConfirmationURL }}"
                 style="display:inline-block; background-color:#6B3550; color:#FBF4EF; font-family:'Nunito Sans', Helvetica, Arial, sans-serif; font-size:15px; font-weight:600; text-decoration:none; padding:13px 32px; border-radius:999px;">
                Accept invite
              </a>
            </td>
          </tr>
        </table>
        <p style="font-size:13px; line-height:1.6; color:#3A2A33; opacity:0.5; text-align:center; margin:28px 0 0;">
          If you weren't expecting this, you can safely ignore this email.
        </p>
      </td>
    </tr>
    <tr>
      <td style="text-align:center; padding-top:24px;">
        <span style="font-size:12px; color:#6B3550; opacity:0.5;">Sorted &amp; Stocked</span>
      </td>
    </tr>
  </table>
</div>
